<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    VectorScaleDB — Temporal Planes Mark
    Three overlapping diamond planes (past → present → future)
    cascading diagonally with a bright convergence node at center.
    Represents temporal layers, data convergence, and compression.
  -->
  <rect width="64" height="64" rx="14" fill="#09090b"/>

  <!-- Temporal Plane 1: Past (purple, furthest back) -->
  <polygon points="30,8 44,22 30,36 16,22" fill="#7c3aed" opacity="0.35"/>

  <!-- Temporal Plane 2: Present (indigo, middle) -->
  <polygon points="32,16 46,30 32,44 18,30" fill="#4f46e5" opacity="0.45"/>

  <!-- Temporal Plane 3: Future (blue, front) -->
  <polygon points="34,24 48,38 34,52 20,38" fill="#2563eb" opacity="0.6"/>

  <!-- Data nodes on each plane -->
  <circle cx="23" cy="22" r="1.5" fill="#a78bfa" opacity="0.6"/>
  <circle cx="37" cy="22" r="1.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="39" cy="30" r="1.5" fill="#818cf8" opacity="0.65"/>
  <circle cx="25" cy="30" r="1.5" fill="#818cf8" opacity="0.55"/>
  <circle cx="27" cy="38" r="1.5" fill="#60a5fa" opacity="0.7"/>
  <circle cx="41" cy="38" r="1.5" fill="#60a5fa" opacity="0.6"/>

  <!-- Temporal continuity edges (connecting data across planes) -->
  <line x1="23" y1="22" x2="25" y2="30" stroke="#c4b5fd" stroke-width="0.6" opacity="0.25"/>
  <line x1="37" y1="22" x2="39" y2="30" stroke="#a5b4fc" stroke-width="0.6" opacity="0.25"/>
  <line x1="25" y1="30" x2="27" y2="38" stroke="#93c5fd" stroke-width="0.6" opacity="0.25"/>
  <line x1="39" y1="30" x2="41" y2="38" stroke="#93c5fd" stroke-width="0.6" opacity="0.25"/>

  <!-- Convergence glow -->
  <circle cx="32" cy="30" r="8" fill="#3b82f6" opacity="0.1"/>

  <!-- Convergence node -->
  <circle cx="32" cy="30" r="3.5" fill="#fff" opacity="0.95"/>
</svg>
