<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="#0a0e17"/>
  <!-- V shape formed by two vector paths converging at bottom center -->
  <!-- Left arm -->
  <line x1="14" y1="16" x2="32" y2="48" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="50" y1="16" x2="32" y2="48" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>
  <!-- Temporal nodes along left arm -->
  <circle cx="14" cy="16" r="3.5" fill="#3b82f6"/>
  <circle cx="23" cy="32" r="3" fill="#5b6ef6"/>
  <!-- Temporal nodes along right arm -->
  <circle cx="50" cy="16" r="3.5" fill="#8b5cf6"/>
  <circle cx="41" cy="32" r="3" fill="#7566f6"/>
  <!-- Convergence node -->
  <circle cx="32" cy="48" r="4.5" fill="#fff"/>
  <!-- Horizontal time-axis tick marks -->
  <line x1="20" y1="24" x2="44" y2="24" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="24" y1="32" x2="40" y2="32" stroke="#6b6ef6" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="27" y1="40" x2="37" y2="40" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
</svg>
