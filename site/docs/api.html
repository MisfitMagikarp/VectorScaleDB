            request: '{\n  "reason": "scheduled_quarterly_rotation",\n  "algorithm": "AES-256-GCM"\n}',
            response: '{\n  "key_id": "key-2026-03-08-001",\n  "algorithm": "AES-256-GCM",\n  "rotated_at": "2026-03-08T16:00:00Z",\n  "segments_re_encrypted": 4821,\n  "duration_ms": 12480\n}',
            curl: 'curl -X POST http://localhost:8080/v1/admin/encryption/rotate \\\n  -H "Authorization: Bearer $ADMIN_TOKEN" \\\n  -H "Content-Type: application/json" \\\n  -d \'{"reason": "scheduled_quarterly_rotation"}\''
          },
          {
            method: 'GET',

        endpoints: [

            method: 'POST',
