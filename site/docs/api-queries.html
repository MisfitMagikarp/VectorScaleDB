<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temporal-Semantic Queries API | VectorScaleDB Docs</title>
  <meta name="description" content="Temporal-semantic query endpoints for VectorScaleDB. KNN, trajectory similarity, scene diff, anomaly scoring, and forecasting.">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta name="theme-color" content="#09090b">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../docs.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="docs-nav"></div>
  <div class="docs-layout">
    <div id="docs-sidebar"></div>
    <main class="docs-content" id="docs-content">
      <ul class="docs-breadcrumb">
        <li><a href="../">Home</a></li>
        <li><a href="api.html">API Reference</a></li>
        <li>Temporal-Semantic Queries</li>
      </ul>
      <h1>Temporal-Semantic Queries</h1>
      <p class="docs-intro">Time-bounded KNN, trajectory similarity, scene differencing, anomaly scoring, and behavioral forecasting.</p>
      <div class="docs-callout docs-callout--info">Base URL: <code>https://your-instance.vectorscaledb.com</code></div>
      <div id="api-endpoints"></div>
    </main>
  </div>
  <div id="docs-footer"></div>
  <script src="../components.js"></script>
  <script src="../docs.js"></script>
  <script>
    const API_DATA = [
      {
        title: 'Temporal-Semantic Queries',
        id: 'temporal-semantic-queries',
        open: true,
        endpoints: [
          {
            method: 'POST',
            path: '/v1/query/temporal-knn',
            desc: 'Time-bounded K-nearest neighbors search. Finds the K most similar vectors within a specified time window, combining temporal proximity with semantic similarity.',
            request: '{\n  "embedding": [0.12, -0.34, 0.56, ...],\n  "k": 10,\n  "time_range": {\n    "start": "2026-03-07T00:00:00Z",\n    "end": "2026-03-08T00:00:00Z"\n  },\n  "entity_type": "VEHICLE"\n}',
            response: '{\n  "results": [\n    {\n      "entity_id": "vehicle-0042",\n      "timestamp": "2026-03-07T14:22:01Z",\n      "similarity": 0.971,\n      "metadata": { "source": "gps" }\n    }\n  ],\n  "total": 10,\n  "latency_ms": 0.82\n}',
            curl: 'curl -X POST http://localhost:8080/v1/query/temporal-knn \\\n  -H "Content-Type: application/json" \\\n  -d \'{"embedding": [0.12, -0.34, 0.56], "k": 10, "time_range": {"start": "2026-03-07T00:00:00Z", "end": "2026-03-08T00:00:00Z"}}\''
          },
          {
            method: 'POST',
            path: '/v1/query/trajectory',
            desc: 'DTW-based trajectory similarity comparison. Compares the behavioral trajectory of one entity against another or against a reference pattern.',
            request: '{\n  "entity_a": "vehicle-0042",\n  "entity_b": "vehicle-0099",\n  "time_range": {\n    "start": "2026-03-08T08:00:00Z",\n    "end": "2026-03-08T12:00:00Z"\n  },\n  "algorithm": "dtw"\n}',
            response: '{\n  "similarity_score": 0.847,\n  "dtw_distance": 12.34,\n  "aligned_length": 421,\n  "divergence_points": [\n    { "timestamp": "2026-03-08T10:14:22Z", "gap": 0.42 }\n  ],\n  "latency_ms": 18.4\n}',
            curl: 'curl -X POST http://localhost:8080/v1/query/trajectory \\\n  -H "Content-Type: application/json" \\\n  -d \'{"entity_a": "vehicle-0042", "entity_b": "vehicle-0099", "time_range": {"start": "2026-03-08T08:00:00Z", "end": "2026-03-08T12:00:00Z"}}\''
          },
          {
            method: 'POST',
            path: '/v1/query/anomaly-score',
            desc: 'Behavioral anomaly scoring for an entity. Computes how much the current behavior deviates from the entity\'s historical baseline.',
            request: '{\n  "entity_id": "vehicle-0042",\n  "timestamp": "2026-03-08T15:30:00Z",\n  "baseline_window": "7d"\n}',
            response: '{\n  "entity_id": "vehicle-0042",\n  "anomaly_score": 0.87,\n  "severity": "high",\n  "contributing_factors": [\n    { "factor": "route_deviation", "weight": 0.62 },\n    { "factor": "speed_profile", "weight": 0.25 }\n  ],\n  "latency_ms": 4.7\n}',
            curl: 'curl -X POST http://localhost:8080/v1/query/anomaly-score \\\n  -H "Content-Type: application/json" \\\n  -d \'{"entity_id": "vehicle-0042", "timestamp": "2026-03-08T15:30:00Z", "baseline_window": "7d"}\''
          },
          {
            method: 'POST',
            path: '/v1/query/forecast',
            desc: 'Behavioral trajectory forecasting. Predicts the likely future behavioral trajectory of an entity based on historical patterns.',
            request: '{\n  "entity_id": "vehicle-0042",\n  "horizon": "1h",\n  "confidence_intervals": [0.5, 0.9, 0.99]\n}',
            response: '{\n  "entity_id": "vehicle-0042",\n  "forecast": [\n    {\n      "timestamp": "2026-03-08T16:00:00Z",\n      "predicted_embedding": [...],\n      "confidence": { "p50": 0.12, "p90": 0.31, "p99": 0.58 }\n    }\n  ],\n  "model": "behavioral_extrapolation",\n  "latency_ms": 8.2\n}',
            curl: 'curl -X POST http://localhost:8080/v1/query/forecast \\\n  -H "Content-Type: application/json" \\\n  -d \'{"entity_id": "vehicle-0042", "horizon": "1h", "confidence_intervals": [0.5, 0.9, 0.99]}\''
          },
          {
            method: 'POST',
            path: '/v1/query/segment-distance',
            desc: 'Compare two segments using cosine or Wasserstein-2 distance. Useful for measuring distributional similarity between compressed behavioral summaries across any entity type.',
            request: '{\n  "segment_a": "seg-00a1b2c3",\n  "segment_b": "seg-00d4e5f6",\n  "metric": "wasserstein"\n}',
            response: '{\n  "distance": 0.142,\n  "metric": "wasserstein",\n  "segment_a_entities": 12,\n  "segment_b_entities": 8,\n  "latency_ms": 1.4\n}',
            curl: 'curl -X POST http://localhost:8080/v1/query/segment-distance \\\n  -H "Content-Type: application/json" \\\n  -d \'{"segment_a": "seg-00a1b2c3", "segment_b": "seg-00d4e5f6", "metric": "wasserstein"}\''
          },
          {
            method: 'POST',
            path: '/v1/query/subspace-drift',
            desc: 'Measure null-space subspace drift between two time windows. Detects structural changes in entity behavior that may not be visible in raw vector distance.',
            request: '{\n  "entity_type": "LINK_METRIC",\n  "window_a": {\n    "start": "2026-03-01T00:00:00Z",\n    "end": "2026-03-04T00:00:00Z"\n  },\n  "window_b": {\n    "start": "2026-03-04T00:00:00Z",\n    "end": "2026-03-07T00:00:00Z"\n  }\n}',
            response: '{\n  "drift_score": 0.38,\n  "principal_angle_degrees": 22.1,\n  "affected_dimensions": [3, 7, 11],\n  "interpretation": "moderate_structural_shift",\n  "latency_ms": 14.6\n}',
            curl: 'curl -X POST http://localhost:8080/v1/query/subspace-drift \\\n  -H "Content-Type: application/json" \\\n  -d \'{"entity_type": "LINK_METRIC", "window_a": {"start": "2026-03-01T00:00:00Z", "end": "2026-03-04T00:00:00Z"}, "window_b": {"start": "2026-03-04T00:00:00Z", "end": "2026-03-07T00:00:00Z"}}\''
          },
          {
            method: 'POST',
            path: '/v1/query/topological-anomaly',
            desc: 'Detect topological changes in entity behavior via persistent homology. Identifies structural anomalies such as merging clusters, emerging loops, or fragmenting groups that distance-based methods miss.',
            request: '{\n  "entity_type": "NETWORK_FLOW",\n  "time_range": {\n    "start": "2026-03-07T00:00:00Z",\n    "end": "2026-03-08T00:00:00Z"\n  },\n  "max_dimension": 2\n}',
            response: '{\n  "anomalies": [\n    {\n      "timestamp": "2026-03-07T14:22:00Z",\n      "type": "new_loop",\n      "persistence": 0.72,\n      "dimension": 1,\n      "severity": "high"\n    }\n  ],\n  "betti_numbers": [4, 1, 0],\n  "total_anomalies": 3,\n  "latency_ms": 48.2\n}',
            curl: 'curl -X POST http://localhost:8080/v1/query/topological-anomaly \\\n  -H "Content-Type: application/json" \\\n  -d \'{"entity_type": "NETWORK_FLOW", "time_range": {"start": "2026-03-07T00:00:00Z", "end": "2026-03-08T00:00:00Z"}, "max_dimension": 2}\''
          }
        ]
      }
    ];
    document.addEventListener('DOMContentLoaded', () => {
      VsdbDocs.init('api-queries');
      const container = document.getElementById('api-endpoints');
      API_DATA.forEach(group => {
        VsdbDocs.renderEndpointGroup(container, group);
      });
    });
  </script>
</body>
</html>
